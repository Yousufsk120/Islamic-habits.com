<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Islamic Habits logo</title>
  <desc id="desc">A non-figurative logo with the Kaaba below, Bayt al-Ma'mur above, and a luminous line of prayer connecting both.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="68%">
      <stop offset="0" stop-color="#153f35"/>
      <stop offset="0.58" stop-color="#09221e"/>
      <stop offset="1" stop-color="#04110f"/>
    </radialGradient>
    <linearGradient id="gold" x1="118" y1="420" x2="390" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a87525"/>
      <stop offset="0.42" stop-color="#f4d276"/>
      <stop offset="1" stop-color="#fff3b8"/>
    </linearGradient>
    <linearGradient id="emerald" x1="116" y1="370" x2="392" y2="144" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b8b68"/>
      <stop offset="1" stop-color="#59e2b0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="92" fill="url(#bg)"/>
  <g opacity="0.42" fill="none" stroke="#f4d276" stroke-width="1">
    <circle cx="256" cy="236" r="172"/>
    <circle cx="256" cy="236" r="126"/>
    <path d="M104 352c58-88 96-178 152-178s94 90 152 178"/>
    <path d="M86 286h340M256 70v360"/>
  </g>

  <g filter="url(#glow)">
    <path d="M256 72c44 44 72 70 72 112h-144c0-42 28-68 72-112z" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <path d="M204 184h104v28H204zM220 156h72v28h-72z" fill="none" stroke="#f4d276" stroke-width="4"/>
    <path d="M256 50v370" stroke="#f4d276" stroke-width="5" stroke-linecap="round"/>
    <circle cx="256" cy="50" r="6" fill="#fff3b8"/>
    <circle cx="256" cy="214" r="8" fill="#fff3b8"/>
  </g>

  <path d="M256 410C110 300 104 196 174 168c44-18 75 10 82 46 7-36 38-64 82-46 70 28 64 132-82 242z" fill="none" stroke="url(#gold)" stroke-width="13" stroke-linejoin="round"/>
  <path d="M256 372C154 292 150 216 196 198c30-12 52 9 60 42 8-33 30-54 60-42 46 18 42 94-60 174z" fill="none" stroke="url(#emerald)" stroke-width="5" opacity="0.88"/>

  <g>
    <path d="M170 294l86-38 86 38v92l-86 38-86-38z" fill="#070907" stroke="#f4d276" stroke-width="5" stroke-linejoin="round"/>
    <path d="M170 294l86 34 86-34M256 328v96" fill="none" stroke="#6c4a1b" stroke-width="4"/>
    <path d="M184 306h144v28H184z" fill="#16100a" stroke="#f4d276" stroke-width="3"/>
    <path d="M204 316h104" stroke="#fff3b8" stroke-width="3" stroke-linecap="round" opacity="0.72"/>
    <path d="M247 352h18v48h-18z" fill="#d8ac4d"/>
  </g>

  <g fill="#f4d276" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <text x="256" y="118" font-size="36" font-weight="700">الله</text>
    <text x="256" y="383" font-size="28" font-weight="700">محمد ﷺ</text>
  </g>

  <g fill="#fff3b8">
    <circle cx="142" cy="250" r="3"/>
    <circle cx="370" cy="250" r="3"/>
    <circle cx="122" cy="326" r="3"/>
    <circle cx="390" cy="326" r="3"/>
    <circle cx="188" cy="132" r="3"/>
    <circle cx="324" cy="132" r="3"/>
  </g>
</svg>
