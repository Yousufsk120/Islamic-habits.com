<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Bukhari and Iqbal bridge</title>
  <desc id="desc">A bridge connecting purified intention and awakened selfhood.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061512"/>
      <stop offset="0.5" stop-color="#12372f"/>
      <stop offset="1" stop-color="#171e1b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="44" fill="url(#bg)"/>
  <path d="M160 530c210-220 670-220 880 0" fill="none" stroke="#f0bf55" stroke-width="18" stroke-linecap="round"/>
  <path d="M210 530h780" stroke="#5bd6e8" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <g stroke="#42d19b" stroke-width="7" opacity="0.72">
    <path d="M300 530v-95"/>
    <path d="M450 530v-145"/>
    <path d="M600 530v-165"/>
    <path d="M750 530v-145"/>
    <path d="M900 530v-95"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#f6f2e8">
    <text x="600" y="110" text-anchor="middle" font-size="50" font-weight="900">From Niyyah to Khudi</text>
    <text x="600" y="164" text-anchor="middle" font-size="24" fill="#bed2cb">Purify the heart, awaken the self, then build meaningful civilization.</text>
    <text x="285" y="612" text-anchor="middle" font-size="32" font-weight="900">Bukhari</text>
    <text x="285" y="652" text-anchor="middle" font-size="22" fill="#bed2cb">Correct intention</text>
    <text x="915" y="612" text-anchor="middle" font-size="32" font-weight="900">Iqbal</text>
    <text x="915" y="652" text-anchor="middle" font-size="22" fill="#bed2cb">Awaken the self</text>
    <text x="600" y="414" text-anchor="middle" font-size="30" font-weight="800">Meaningful Action</text>
  </g>
</svg>
