<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Two intentions behind one action</title>
  <desc id="desc">Two pathways showing charity for Allah versus showing off.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#071b18"/><stop offset="1" stop-color="#17211e"/></linearGradient>
  </defs>
  <rect width="1200" height="760" rx="44" fill="url(#bg)"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <text x="600" y="92" fill="#f6f2e8" font-size="48" font-weight="900">Same Action, Different Weight</text>
    <text x="600" y="143" fill="#bed2cb" font-size="23">The visible deed is similar; the hidden intention changes its value.</text>
  </g>
  <g transform="translate(120 220)">
    <rect width="430" height="360" rx="28" fill="#102b27" stroke="#42d19b" stroke-width="5"/>
    <circle cx="215" cy="110" r="62" fill="#42d19b" opacity=".22"/>
    <path d="M180 110h70M215 75v70" stroke="#f6f2e8" stroke-width="10" stroke-linecap="round"/>
    <text x="215" y="215" fill="#f6f2e8" font-family="Arial, sans-serif" font-size="34" font-weight="900" text-anchor="middle">For Allah</text>
    <text x="215" y="260" fill="#bed2cb" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">Reward, purification, light</text>
  </g>
  <g transform="translate(650 220)">
    <rect width="430" height="360" rx="28" fill="#102b27" stroke="#f0bf55" stroke-width="5"/>
    <circle cx="215" cy="110" r="62" fill="#f0bf55" opacity=".2"/>
    <path d="M168 112c34-45 60-45 94 0-34 45-60 45-94 0Z" fill="none" stroke="#f6f2e8" stroke-width="9"/>
    <circle cx="215" cy="112" r="14" fill="#f6f2e8"/>
    <text x="215" y="215" fill="#f6f2e8" font-family="Arial, sans-serif" font-size="34" font-weight="900" text-anchor="middle">For display</text>
    <text x="215" y="260" fill="#bed2cb" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">Noise, ego, emptiness</text>
  </g>
</svg>
