<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Khudi awakening pyramid</title>
  <desc id="desc">A non-overlapping pyramid and five side panels showing the stages of Khudi.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#071b18"/><stop offset="1" stop-color="#17312b"/></linearGradient>
    <linearGradient id="pyramid" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f0bf55" stop-opacity=".36"/><stop offset=".55" stop-color="#5bd6e8" stop-opacity=".2"/><stop offset="1" stop-color="#42d19b" stop-opacity=".28"/></linearGradient>
  </defs>
  <rect width="1200" height="820" rx="44" fill="url(#bg)"/>
  <g font-family="Arial, sans-serif" fill="#f6f2e8">
    <text x="600" y="88" text-anchor="middle" font-size="50" font-weight="900">Khudi Is an Awakened Self</text>
    <text x="600" y="137" text-anchor="middle" font-size="23" fill="#bed2cb">The self rises when worship becomes courage, discipline, creativity, and service.</text>
  </g>
  <g transform="translate(600 470)">
    <path d="M0-250 290 230H-290Z" fill="url(#pyramid)" stroke="#f0bf55" stroke-width="8" stroke-linejoin="round"/>
    <path d="M-230 130h460M-176 42h352M-122-48h244M-66-142h132" stroke="#5bd6e8" stroke-width="6" stroke-linecap="round" opacity=".78"/>
    <circle cx="0" cy="-250" r="18" fill="#f0bf55"/>
    <text x="0" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#f6f2e8">KHUDI</text>
  </g>
  <g font-family="Arial, sans-serif" font-weight="800">
    <g transform="translate(86 224)"><rect width="310" height="74" rx="18" fill="#102b27" stroke="#42d19b"/><text x="155" y="32" text-anchor="middle" font-size="22" fill="#f6f2e8">Spiritual awakening</text><text x="155" y="56" text-anchor="middle" font-size="15" fill="#bed2cb">The heart remembers Allah</text></g>
    <g transform="translate(804 224)"><rect width="310" height="74" rx="18" fill="#102b27" stroke="#5bd6e8"/><text x="155" y="32" text-anchor="middle" font-size="22" fill="#f6f2e8">Fearless thought</text><text x="155" y="56" text-anchor="middle" font-size="15" fill="#bed2cb">The mind refuses slavery</text></g>
    <g transform="translate(74 390)"><rect width="330" height="74" rx="18" fill="#102b27" stroke="#f0bf55"/><text x="165" y="32" text-anchor="middle" font-size="22" fill="#f6f2e8">Moral discipline</text><text x="165" y="56" text-anchor="middle" font-size="15" fill="#bed2cb">Desire is trained by purpose</text></g>
    <g transform="translate(796 390)"><rect width="330" height="74" rx="18" fill="#102b27" stroke="#42d19b"/><text x="165" y="32" text-anchor="middle" font-size="22" fill="#f6f2e8">Creative action</text><text x="165" y="56" text-anchor="middle" font-size="15" fill="#bed2cb">Faith produces useful work</text></g>
    <g transform="translate(435 700)"><rect width="330" height="74" rx="18" fill="#102b27" stroke="#f0bf55"/><text x="165" y="32" text-anchor="middle" font-size="22" fill="#f6f2e8">Service to Ummah</text><text x="165" y="56" text-anchor="middle" font-size="15" fill="#bed2cb">The self becomes a mercy</text></g>
  </g>
</svg>
