<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Workshop of Muslim awakening</title>
  <desc id="desc">A workshop scene showing worship, study, creativity, and social service.</desc>
  <rect width="1200" height="760" rx="44" fill="#071b18"/>
  <path d="M100 600h1000" stroke="#f0bf55" stroke-width="6" opacity=".45"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <text x="600" y="92" fill="#f6f2e8" font-size="48" font-weight="900">Awakening Must Become Work</text>
    <text x="600" y="143" fill="#bed2cb" font-size="23">Iqbal rejects a sleeping spirituality; faith should build, study, serve, and create.</text>
  </g>
  <g transform="translate(140 238)">
