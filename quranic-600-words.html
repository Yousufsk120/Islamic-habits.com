const PAYLOAD = PAYLOAD_PARTS.join('');
async function unpack(){
  const bin=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
  if('DecompressionStream'in window){
    const ds=new DecompressionStream('gzip');
    const stream=new Blob([bin]).stream().pipeThrough(ds);
    return await new Response(stream).text();
  }
  throw new Error('Browser does not support gzip decompression');
}
let DATA;
const app=document.getElementById('app'),q=document.getElementById('q'),rc=document.getElementById('rc');
function render(term=''){
  app.innerHTML='';let shown=0;
  for(const [cat,s] of Object.entries(DATA.sections)){
    const cards=DATA.cards.filter(c=>c.cat===cat&&(!term||c.q.toLowerCase().includes(term)));
    if(!cards.length)continue;shown+=cards.length;
    const sec=document.createElement('section');
    sec.innerHTML=`<div class="head"><h2>${s.title}</h2><p>${s.en}</p></div><div class="grid">${cards.map(c=>`<article class="card"><div class="num">${c.num}</div><div class="ar" lang="ar" dir="rtl">${c.ar}</div><div class="tr">${c.tr}</div><div class="en">${c.en}</div><div class="bn" lang="bn">${c.bn}</div>${c.freq?`<div class="freq">${c.freq}</div>`:''}</article>`).join('')}</div>`;
    app.appendChild(sec);
  }
  rc.textContent=shown+' / 600 শব্দ';
  if(!shown)app.innerHTML='<p>কোনো শব্দ পাওয়া যায়নি।</p>';
}
unpack().then(t=>{DATA=JSON.parse(t);q.addEventListener('input',()=>render(q.value.trim().toLowerCase()));render();}).catch(()=>{app.innerHTML='<p>Unable to load vocabulary data in this browser.</p>';});
</script>
